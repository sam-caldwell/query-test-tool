name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go Vet
        run: go vet -v ./...

      - name: Govulncheck
        uses: golang/govulncheck-action@v1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Unit Tests
        run: go test -count=1 -race -timeout 60s ./parser/... ./scorer/... ./calibrate/...

      - name: Integration Tests
        run: go test -count=1 -race -timeout 120s -tags integration ./...

      - name: E2E Tests
        run: |
          go build -o bin/sqlscore ./cmd/sqlscore
          go test -count=1 -timeout 120s ./cmd/sqlscore/...

      - name: Coverage
        run: |
          go test ./parser/... ./scorer/... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

      - name: Upload Coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          VERSION=$(cat VERSION)
          COMMIT=$(git rev-parse --short HEAD)
          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o bin/sqlscore-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/sqlscore
          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o bin/calibrate-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/calibrate

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*
