name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Go Vet
        run: go vet -v ./...

      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Unit Tests
        run: go test -count=1 -race -timeout 60s ./parser/... ./scorer/... ./calibrate/...

      - name: Integration Tests
        run: go test -count=1 -race -timeout 120s -tags integration ./...

      - name: E2E Tests
        run: |
          go build -o bin/sqlscore ./cmd/sqlscore
          go test -count=1 -timeout 120s ./cmd/sqlscore/...

      - name: Coverage
        run: |
          go test ./parser/... ./scorer/... -coverprofile=coverage.out -covermode=atomic
          go tool cover -func=coverage.out | tail -1

      - name: Upload Coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build sqlscore
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=$(cat VERSION)
          COMMIT=$(git rev-parse --short HEAD)
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o bin/sqlscore-${GOOS}-${GOARCH}${EXT} ./cmd/sqlscore
          go build -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT}" \
            -o bin/calibrate-${GOOS}-${GOARCH}${EXT} ./cmd/calibrate

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
